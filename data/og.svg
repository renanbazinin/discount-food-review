<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Assistant, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1220"/>
      <stop offset="1" stop-color="#1a1028"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a5c"/>
      <stop offset="1" stop-color="#b93a22"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff5a3c" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff5a3c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="315" r="360" fill="url(#glow)"/>

  <g transform="translate(820 175)">
    <path d="M0 140 Q160 70 320 140 L290 260 Q160 300 30 260 Z" fill="url(#bowl)"/>
    <path d="M70 30 Q90 80 60 130" stroke="#f7f3ec" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M150 10 Q170 70 140 130" stroke="#f7f3ec" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M230 30 Q250 80 220 130" stroke="#f7f3ec" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
  </g>

  <g direction="rtl">
    <text x="80" y="230" fill="#ff7a5c" font-size="32" font-weight="700" letter-spacing="4">★ הדירוג של כולם</text>
    <text x="80" y="340" fill="#f7f3ec" font-size="92" font-weight="800">דירוג אוכל</text>
    <text x="80" y="410" fill="#f7f3ec" font-size="40" font-weight="600" opacity="0.85">המנות הכי טובות ב־10bis</text>
    <text x="80" y="470" fill="#f7f3ec" font-size="28" font-weight="400" opacity="0.6">דרגו, השוו, גלו מה לא לפספס בצהריים</text>
  </g>
